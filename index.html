<script id="bulk-edit-same-extra-group">
/* Edit one extra-specification group, then apply its settings to every group
   with the same name in this store menu. */
(()=>{
  const cloneRows=rows=>(rows||[]).map(row=>({id:crypto.randomUUID?.()||('row'+Date.now()+Math.random()),label:String(row.label||''),price:String(row.price??'')}));
  const normalizedName=value=>String(value||'').trim().replace(/\s+/g,' ').toLocaleLowerCase();
  const findGroup=(bid,iid,gid)=>{
    const block=(state.menuBuilder||[]).find(entry=>entry.id===bid);
    const item=block?.items?.find(entry=>entry.id===iid);
    return item?.groups?.find(entry=>entry.id===gid);
  };
  window.builderApplySameNamedGroup=function(bid,iid,gid){
    const source=findGroup(bid,iid,gid),key=normalizedName(source?.name);
    if(!source||!key)return alert('請先填寫規格欄位名稱，再套用。');
    const blocks=state.menuBuilder||[];
    const blockLabel=block=>String(block.title||'').trim()||`空白${blocks.findIndex(entry=>entry.id===block.id)+1}`;
    const choices=blocks.map(block=>({block,items:(block.items||[]).filter(item=>item.id!==iid)})).filter(choice=>choice.items.length);
    if(!choices.length)return alert('至少需要另一個品項才能套用規格。');
    $('#modal').innerHTML=`<div class="modal"><div class="modalbox form"><h2>選擇要套用的品項</h2><p class="small">將「${esc(source.name)}」套用到勾選的品項；套用後仍可各自修改。</p><div style="display:grid;gap:10px">${choices.map(({block,items})=>`<details style="padding:10px;border:1px solid var(--line);border-radius:10px"><summary style="cursor:pointer"><label class="builder-check" style="display:inline-flex;font-weight:700" onclick="event.stopPropagation()"><input type="checkbox" data-bulk-block-toggle data-block-id="${esc(block.id)}" checked onchange="builderToggleBulkBlock(this,'${block.id}')"> 【${esc(blockLabel(block))}】</label></summary><div style="display:grid;gap:6px;margin:10px 0 0 26px">${items.map(item=>`<label class="builder-check"><input type="checkbox" data-bulk-item data-bulk-item-block="${esc(block.id)}" value="${esc(block.id)}|${esc(item.id)}" checked> ${esc(item.name||'未命名品項')}</label>`).join('')}</div></details>`).join('')}</div><div class="row" style="margin-top:16px"><button type="button" class="btn light" onclick="closeModal()">取消</button><button type="button" class="btn" onclick="builderConfirmApplySameNamedGroup('${bid}','${iid}','${gid}')">套用選取品項</button></div></div></div>`;
  };
  window.builderToggleBulkBlock=function(toggle,bid){document.querySelectorAll('[data-bulk-item]').forEach(item=>{if(item.dataset.bulkItemBlock===bid)item.checked=toggle.checked});};
  window.builderConfirmApplySameNamedGroup=function(bid,iid,gid){
    const source=findGroup(bid,iid,gid),key=normalizedName(source?.name),selected=new Set([...document.querySelectorAll('[data-bulk-item]:checked')].map(input=>input.value));
    if(!source||!key||!selected.size)return alert('請至少選擇一個品項。');
    let count=0;
    (state.menuBuilder||[]).forEach(block=>{
      (block.items||[]).forEach(item=>{
        if(!selected.has(`${block.id}|${item.id}`))return;
        (item.groups||[]).forEach(group=>{
        if(group.id===source.id||normalizedName(group.name)!==key)return;
        group.noPrice=!!source.noPrice;
        group.required=!!source.required;
        group.rows=cloneRows(source.rows);
        count++;
        });
        const hasSameName=(item.groups||[]).some(group=>normalizedName(group.name)===key);
        if(!hasSameName){item.groups.push({id:crypto.randomUUID?.()||('group'+Date.now()+Math.random()),name:source.name,noPrice:!!source.noPrice,required:!!source.required,collapsed:false,rows:cloneRows(source.rows)});count++;}
      });
    });
    closeModal();renderMenuBuilder();
    alert(`已將「${source.name}」套用到 ${count} 個同名規格欄位。`);
  };
  const previousRender=window.renderMenuBuilder;
  window.renderMenuBuilder=function(){
    const result=previousRender.apply(this,arguments);
    document.querySelectorAll('.extra-group-card').forEach(card=>{
      if(card.querySelector('[data-apply-same-group]'))return;
      const head=card.querySelector('.extra-group-head');if(!head)return;
      const button=document.createElement('button');button.type='button';button.className='btn light smallbtn';button.dataset.applySameGroup='1';button.textContent='套用同名規格';
      button.onclick=()=>builderApplySameNamedGroup(card.dataset.bid,card.dataset.iid,card.dataset.gid);
      const collapse=head.querySelector('.group-collapse-btn');head.insertBefore(button,collapse||null);
    });
    return result;
  };
})();
</script>

<script id="builder-item-level-folding">
/* Section -> item name -> item details.  These UI-only flags stay in the
   draft builder and do not alter the saved menu itself. */
(()=>{
  const originalRender=window.renderMenuBuilder;
  if(typeof originalRender!=='function')return;

  const setInitialFolds=()=>{
    (state.menuBuilder||[]).forEach(block=>{
      (block.items||[]).forEach(item=>{
        if(item.__itemFoldInitialized!==true){
          item.collapsed=true;
          item.__itemFoldInitialized=true;
        }
        (item.groups||[]).forEach(group=>{
          if(group.__groupFoldInitialized!==true){
            group.collapsed=true;
            group.__groupFoldInitialized=true;
          }
        });
      });
    });
  };

  window.renderMenuBuilder=function(...args){
    setInitialFolds();
    const result=originalRender.apply(this,args);
    document.querySelectorAll('.builder-section[data-block]').forEach(section=>{
      const block=(state.menuBuilder||[]).find(entry=>entry.id===section.dataset.block);
      if(!block)return;
      section.querySelectorAll(':scope > .menu-builder > .menu-block').forEach((card,index)=>{
        const item=block.items?.[index];
        if(!item)return;
        const head=card.querySelector(':scope > .menu-block-head');
        if(!head)return;
        const title=head.querySelector('strong');
        if(title)title.textContent=item.name?.trim()||`品項 ${index+1}`;
        card.classList.toggle('item-name-only',item.collapsed!==false);
        head.onclick=event=>{
          if(event.target.closest('button,input,textarea,select,label'))return;
          item.collapsed=!item.collapsed;
          window.renderMenuBuilder();
        };
      });
    });
    return result;
  };
})();
</script>

    if(!table)return;
    const rows=(state.menuBuilder||[]).flatMap((block,blockIndex)=>(block.items||[]).map((item,itemIndex)=>({block,item,blockIndex,itemIndex})));
    table.innerHTML=`<div class="desktop-menu-table-head"><span>品項</span><span>分量與價格</span><span>其他規格</span><span>操作</span></div>${rows.map(({block,item,blockIndex,itemIndex})=>`<div class="desktop-menu-table-row" onclick="desktopOpenMenuItem('${block.id}','${item.id}')"><div class="desktop-table-name">${escapeHtml(clean(item.name)||`品項 ${itemIndex+1}`)}</div><div class="small">${escapeHtml(itemSummary(item))}</div><div class="small">${escapeHtml(groupSummary(item))}</div><button type="button" class="btn light smallbtn" onclick="event.stopPropagation();desktopOpenMenuItem('${block.id}','${item.id}')">編輯</button></div>`).join('')||'<div class="small" style="padding:12px">尚未新增品項</div>'}`;
  };

  window.desktopOpenMenuItem=(blockId,itemId)=>{
    const block=getBlock(blockId),item=block?.items?.find(entry=>entry.id===itemId);
    if(!block||!item)return;
    block.collapsed=false;
    item.collapsed=false;
    window.renderMenuBuilder?.();
    setTimeout(()=>document.querySelector(`#menuBuilder .menu-block-head`)?.scrollIntoView({block:'center',behavior:'smooth'}),0);
  };
  window.desktopSelectStore=id=>window.editStore?.(id);
  window.desktopNewStore=()=>{
    window.clearStoreDraft?.();
    state.menuBuilder=null;state.storeBuildMode='full';state.desktopStoreId='';
    window.admin?.();
  };
  window.desktopDuplicateStore=id=>{
    const source=store(id);if(!source)return;
    const copy=JSON.parse(JSON.stringify(source));
    copy.id=crypto.randomUUID();copy.name=`${source.name}（複製）`;copy.disabled=false;
    data.stores.push(copy);save();state.desktopStoreId=copy.id;window.editStore?.(copy.id);
  };
  window.desktopToggleStore=id=>{
    const target=store(id);if(!target)return;
    target.disabled=!target.disabled;save();state.desktopStoreId=id;window.editStore?.(id);
  };
  window.desktopFilterStores=()=>{
    const keyword=clean(document.querySelector('#desktopStoreSearch')?.value).toLowerCase();
    const category=clean(document.querySelector('#desktopStoreCategory')?.value);
    document.querySelectorAll('[data-desktop-store]').forEach(row=>{
      const searchable=clean(row.textContent).toLowerCase();
      const matchesSearch=!keyword||searchable.includes(keyword);
      const matchesCategory=!category||row.dataset.desktopStoreCategory===category;
      row.classList.toggle('is-filtered-out',!(matchesSearch&&matchesCategory));
    });
  };

  const setup=()=>{
    if(!matchMedia('(min-width:900px)').matches)return;
    const view=document.querySelector('#view');
    if(!view||view.querySelector('#desktopStoreWorkspace'))return;
    const form=view.querySelector(':scope > .card.form');
    const cards=[...view.querySelectorAll(':scope > .card')];
    const list=cards.find(card=>card!==form);
    if(!form||!list)return;
    const selected=document.querySelector('#sname')?.dataset.id||state.desktopStoreId||'';
    const workspace=document.createElement('div');workspace.id='desktopStoreWorkspace';
    const sidebar=document.createElement('aside');sidebar.className='card desktop-store-sidebar';
    const editor=document.createElement('section');editor.className='desktop-store-editor';
    const categories=[...new Set(['飲料','主食',...(data.stores||[]).map(entry=>clean(entry.category)||'未分類')])];
    sidebar.innerHTML=`<div class="desktop-store-title"><b>店家清單</b><button type="button" class="btn light smallbtn" onclick="desktopNewStore()">＋新增店家</button></div><div class="row" style="margin:0"><input id="desktopStoreSearch" type="search" aria-label="搜尋店家" placeholder="🔍 搜尋店家"><select id="desktopStoreCategory" aria-label="分類篩選"><option value="">全部分類</option>${categories.map(category=>`<option value="${escapeHtml(category)}">${escapeHtml(category)}</option>`).join('')}</select></div><div class="desktop-store-list">${(data.stores||[]).slice().sort((a,b)=>Number(!!a.disabled)-Number(!!b.disabled)).map(entry=>{const category=clean(entry.category)||'未分類',search=clean([entry.name,category,entry.phone,entry.address,(entry.items||[]).map(item=>item.name).join(' ')].join(' ')).toLowerCase();return `<div class="desktop-store-row ${entry.id===selected?'active':''}" data-desktop-store="${entry.id}" data-desktop-store-category="${escapeHtml(category)}" data-desktop-store-search="${escapeHtml(search)}" onclick="desktopSelectStore('${entry.id}')"><div class="grow"><b>${escapeHtml(entry.name)}</b><div class="small">${entry.disabled?'已停用':escapeHtml(category)}</div></div><div class="desktop-store-actions"><button type="button" class="btn light smallbtn" title="修改店家" onclick="event.stopPropagation();editStore('${entry.id}')">修改</button><button type="button" class="btn danger smallbtn" title="刪除店家" onclick="event.stopPropagation();deleteStore('${entry.id}')">刪除</button><button type="button" class="btn ${entry.disabled?'light':'danger'} smallbtn" title="停用或啟用店家" onclick="event.stopPropagation();desktopToggleStore('${entry.id}')">${entry.disabled?'啟用':'停用'}</button></div></div>`}).join('')||'<p class="small">尚未建立店家</p>'}</div>`;
    const searchBox=sidebar.querySelector('#desktopStoreSearch'),categoryBox=sidebar.querySelector('#desktopStoreCategory');
    searchBox?.addEventListener('input',window.desktopFilterStores);
    searchBox?.addEventListener('search',window.desktopFilterStores);
    categoryBox?.addEventListener('change',window.desktopFilterStores);
    const editorHeading=document.createElement('div');editorHeading.className='desktop-editor-heading';editorHeading.innerHTML='<h3 style="margin:0">店家資料／菜單編輯</h3><span class="small">直接儲存即可同步</span>';
    editor.append(editorHeading,form);
    workspace.append(sidebar,editor);
    list.remove();
    view.querySelector(':scope > h2')?.insertAdjacentElement('afterend',workspace);
    const menuBuilder=editor.querySelector('#menuBuilder');
    if(menuBuilder){
      const table=document.createElement('div');table.id='desktopMenuTable';table.className='desktop-menu-table';
      menuBuilder.insertAdjacentElement('beforebegin',table);
      window.refreshDesktopMenuTable();
    }
  };

  const beforeAdmin=window.admin;
  window.admin=function(...args){
    const out=beforeAdmin.apply(this,args);
    if(state.adminTab===1)setTimeout(setup,140);
    if(state.adminTab===0)setTimeout(()=>{
      document.querySelectorAll('#gstore option').forEach(option=>{
        const entry=store(option.value);if(!entry?.disabled)return;
        option.disabled=true;option.textContent=`${entry.name}（已停用）`;
      });
    },0);
    return out;
  };
  const beforeRenderBuilder=window.renderMenuBuilder;
  if(typeof beforeRenderBuilder==='function'){
    window.renderMenuBuilder=function(...args){
      const out=beforeRenderBuilder.apply(this,args);
      setTimeout(()=>window.refreshDesktopMenuTable?.(),0);
      return out;
    };
  }
  window.addEventListener('resize',()=>{if(matchMedia('(min-width:900px)').matches&&state.adminTab===1)setTimeout(setup,0)});
})();
</script>
<script id="external-menu-cleanup-and-preview">
(()=>{
  const isExternal=value=>/^https?:\/\//i.test(String(value||'').trim());

  /* Remove older uploaded menu files after switching to external menu links. */
  let changed=false;
  (data.stores||[]).forEach(s=>{
    const files=s.menuFiles?.length?s.menuFiles:(s.importData?[{name:s.importName||'菜單',data:s.importData}]:[]);
    const external=files.filter(file=>isExternal(file?.data));
    if(external.length!==files.length||String(s.importData||'').startsWith('data:'))changed=true;
    s.menuFiles=external;
    s.importName=external[0]?.name||'';
    s.importData=external[0]?.data||'';
  });
  if(changed)save();

  /* The established-store preview only lists required option groups. */
  previewStore=function(id){
    const s=store(id);if(!s)return;
    const rows=(s.items||[]).map(item=>{
      const visible=optionGroups(item).filter(group=>group.required!==false);
      const details=visible.length
        ? visible.map(group=>`${esc(group.name)}（${group.values.map(esc).join('、')}）`).join('／')
        : variants(item).map(variant=>esc(variant.spec)).join('／');
      const pricing=visible.find(group=>group.pricing);
      const price=pricing
        ? pricing.values.map(value=>`NT$ ${Number(pricing.adjustments?.[value]||0).toLocaleString()}`).join('／')
        : variants(item).map(variant=>`NT$ ${Number(variant.price||0).toLocaleString()}`).join('／');
      return `<div class="menu-item"><div class="grow"><b>${esc(item.name)}</b><div class="small">${details}${price?`　${price}`:''}</div></div></div>`;
    }).join('')||'<p class="small">尚無品項</p>';
    $('#modal').innerHTML=`<div class="modal"><div class="modalbox"><button class="btn light smallbtn" style="float:right" onclick="closeModal()">關閉</button><span class="badge">${esc(s.category||'未分類')}</span><h2>${esc(s.name)}</h2><p class="small">${s.phone?`電話 ${esc(s.phone)}`:''}</p>${mapHtml(s.address)}${rows}</div></div>`;
  };
})();
</script>
<script id="supabase-role-permissions-client">
/* Supabase role login. Service Role Key is deliberately never placed in this file. */
(()=>{
  const ROLE_FUNCTION='admin-accounts';
  const legacyOpenAdmin=window.openAdmin;
  const legacyLogout=window.logout;
  const legacyAdmin=window.admin;
  let client=null,backendChecked=false,backendReady=false,role='user';

  const loadSdk=()=>new Promise((resolve,reject)=>{
    if(window.supabase?.createClient)return resolve(window.supabase);
    const script=document.createElement('script');
    script.src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
    script.onload=()=>window.supabase?.createClient?resolve(window.supabase):reject(new Error('SDK 載入失敗'));
    script.onerror=()=>reject(new Error('SDK 載入失敗'));
    document.head.appendChild(script);
  });
  const setToken=session=>{if(session?.access_token)headers.Authorization='Bearer '+session.access_token};
  const isAdmin=()=>role==='sup'||role==='adm';
  const isSup=()=>role==='sup';
  const escapeRole=v=>esc(String(v||''));
  const normalizeLoginName=value=>String(value||'').trim().toLowerCase();
  const validLoginName=value=>/^[a-z0-9][a-z0-9._-]{2,23}$/.test(value);
  const internalLoginEmail=(expected,loginName)=>`${expected}.${loginName}@together.local`;
  const roleChoiceStyle=document.createElement('style');
  roleChoiceStyle.textContent=`
    .role-choice{width:min(620px,calc(100vw - 42px));padding:24px;display:grid;grid-template-columns:1fr 260px;gap:28px;align-items:center}
    .role-choice h2{margin:0 0 12px;font-size:24px}.role-choice .small{margin:0}
    .role-choice-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}.role-choice-actions .btn{width:100%;min-height:40px}.role-choice-actions .role-cancel{grid-column:1 / -1}
    @media(max-width:540px){.role-choice{grid-template-columns:1fr;gap:20px}.role-choice-actions{grid-template-columns:1fr}}
  `;
  document.head.appendChild(roleChoiceStyle);

  async function bootAuth(){
    if(backendChecked)return backendReady;
    backendChecked=true;
    try{
      const sdk=await loadSdk();
      client=sdk.createClient(SUPABASE_URL,SUPABASE_KEY,{auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:true}});
      let {data:{session}}=await client.auth.getSession();
      if(!session){
        const {data,error}=await client.auth.signInAnonymously();
        if(error)throw error;
        session=data.session;
      }
      setToken(session);
      const {data:profile,error}=await client.from('profiles').select('role,is_active').eq('id',session.user.id).maybeSingle();
      if(error && !/relation|does not exist|404/i.test(error.message||''))throw error;
      backendReady=!error;
      role=profile?.is_active?profile.role:'user';
      state.role=role;
      client.auth.onAuthStateChange((_event,nextSession)=>setToken(nextSession));
    }catch(error){
      console.info('角色系統尚未啟用，暫時使用原有登入。',error);
      backendReady=false;role='user';state.role='user';
    }
    return backendReady;
  }
  function loginChoice(){
    $('#modal').innerHTML=`<div class="modal"><div class="modalbox role-choice"><div><h2>後台登入</h2><p class="small">請選擇登入方式。</p></div><div class="role-choice-actions"><button class="btn" onclick="roleSupGate()">調皮了</button><button class="btn light" onclick="roleLoginForm('adm')">帳號登入</button><button class="btn light role-cancel" onclick="closeModal()">取消</button></div></div></div>`;
  }
  window.roleSupGate=()=>{
    $('#modal').innerHTML=`<div class="modal"><div class="modalbox form"><h2>調皮了</h2><label>入口密碼</label><input id="roleGatePassword" type="password" inputmode="numeric" autocomplete="current-password" placeholder="請輸入入口密碼" onkeydown="if(event.key==='Enter')roleCheckSupGate()"><p class="small">已登入過最高管理員的裝置，輸入後可直接進入後台。</p><div class="row" style="margin-top:16px"><button class="btn light" onclick="openAdmin()">返回</button><button class="btn" onclick="roleCheckSupGate()">進入後台</button></div></div></div>`;
    setTimeout(()=>$('#roleGatePassword')?.focus(),0);
  };
  window.roleCheckSupGate=async()=>{
    if($('#roleGatePassword')?.value!=='7777')return alert('密碼錯誤');
    await bootAuth();
    if(isSup()){closeModal();openAdmin();return;}
    window.roleLoginForm('sup');
  };
  window.roleLoginForm=expected=>{
    const title=expected==='sup'?'最高管理員帳號登入':'一般管理員帳號登入';
    $('#modal').innerHTML=`<div class="modal"><div class="modalbox form"><h2>${title}</h2><label>帳號名稱</label><input id="roleLoginName" type="text" autocomplete="username" autocapitalize="none" placeholder="例如：youjhen"><p class="small">限 3～24 個英文字母、數字、句點、底線或連字號。</p><label>密碼</label><input id="rolePassword" type="password" autocomplete="current-password" placeholder="請輸入帳號密碼" onkeydown="if(event.key==='Enter')roleSignIn('${expected}')"><div class="row" style="margin-top:16px"><button class="btn light" onclick="openAdmin()">返回</button><button class="btn" onclick="roleSignIn('${expected}')">登入</button></div></div></div>`;
    setTimeout(()=>$('#roleLoginName')?.focus(),0);
  };
  window.roleSignIn=async expected=>{
    if(!client)return alert('登入服務尚未就緒，請稍後再試。');
    const loginName=normalizeLoginName($('#roleLoginName')?.value),password=$('#rolePassword')?.value||'';
    if(!validLoginName(loginName)||!password)return alert('請輸入正確的帳號名稱與密碼。');
    let email=internalLoginEmail(expected,loginName);
    try{
      const {data:resolvedEmail,error:resolveError}=await client.rpc('resolve_admin_login_email',{p_login_name:loginName,p_expected_role:expected});
      if(!resolveError&&resolvedEmail)email=resolvedEmail;
    }catch(_){/* 舊版資料庫尚未套用對照函式時，使用新帳號的內部識別。 */}
    const {data:signIn,error:signInError}=await client.auth.signInWithPassword({email,password});
    if(signInError||!signIn.session)return alert('帳號或密碼錯誤。');
    setToken(signIn.session);
    const {data:profile,error}=await client.from('profiles').select('role,is_active').eq('id',signIn.session.user.id).maybeSingle();
    if(error||!profile?.is_active||profile.role!==expected){
      await client.auth.signOut();
      backendChecked=false;await bootAuth();
      return alert(expected==='sup'?'此帳號不是有效的最高管理員。':'此帳號不是有效的一般管理員。');
    }
    role=profile.role;state.role=role;closeModal();state.page='admin';state.adminTab=0;render();
  };
  window.openAdmin=async()=>{
    await bootAuth();
    if(!backendReady)return legacyOpenAdmin();
    if(isAdmin()){
      state.page='admin';render();return;
    }
    loginChoice();
  };
  window.logout=async()=>{
    if(!backendReady)return legacyLogout();
    await client?.auth.signOut();
    backendChecked=false;role='user';state.role='user';
    await bootAuth();state.page='home';render();
  };
  window.admin=function(...args){
    if(backendReady&&!isAdmin()){
      state.page='home';return render();
    }
    if(backendReady&&role==='adm'&&state.adminTab===3)state.adminTab=0;
    const result=legacyAdmin.apply(this,args);
    if(backendReady&&role==='adm'){
      const tabs=[...document.querySelectorAll('#tabs .tab')];
      if(tabs[3])tabs[3].style.display='none';
    }
    if(backendReady&&isSup()&&state.adminTab===3)queueMicrotask(addAccountManager);
    return result;
  };
  function supOnly(action,legacy){
    return function(...args){
      if(backendReady&&!isSup())return alert('只有最高管理員可以'+action+'。');
      return legacy.apply(this,args);
    };
  }
  ['deleteGroup','deleteStore','removeOrder'].forEach(name=>{
    const old=window[name];if(typeof old!=='function')return;
    window[name]=supOnly(name==='deleteGroup'?'刪除團購':name==='deleteStore'?'刪除店家':'刪除訂單',old);
  });
  function authHeaders(){return {'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':headers.Authorization};}
  async function callAccounts(payload){
    const response=await fetch(`${SUPABASE_URL}/functions/v1/${ROLE_FUNCTION}`,{method:'POST',headers:authHeaders(),body:JSON.stringify(payload)});
    const json=await response.json().catch(()=>({}));
    if(!response.ok)throw new Error(json.error||'操作失敗');
    return json;
  }
  function addAccountManager(){
    const host=$('#view');if(!host||host.querySelector('#roleAccountManager'))return;
    const card=document.createElement('section');card.id='roleAccountManager';card.className='card';
    card.innerHTML=`<div class="row" style="justify-content:space-between"><div><b>一般管理員帳號</b><div class="small">最高管理員可建立、停用或啟用帳號；有效帳號最多 10 位。</div></div><button class="btn smallbtn" onclick="showAdminAccounts()">管理帳號</button></div>`;
    host.append(card);
  }
  window.showAdminAccounts=async()=>{
    if(!isSup())return alert('只有最高管理員可以管理帳號。');
    $('#modal').innerHTML=`<div class="modal"><div class="modalbox form" style="max-width:680px"><button class="btn light smallbtn" style="float:right" onclick="closeModal()">關閉</button><h2>一般管理員帳號</h2><div id="accountList" class="small">讀取中…</div><hr class="divider"><b>建立一般管理員</b><label>帳號名稱</label><input id="newAdminLoginName" type="text" autocapitalize="none" placeholder="例如：youjhen"><p class="small">限 3～24 個英文字母、數字、句點、底線或連字號。</p><label>初始密碼（至少 4 字元）</label><input id="newAdminPassword" type="password" minlength="4" placeholder="請設定密碼"><button class="btn full" style="margin-top:12px" onclick="createAdminAccount()">建立一般管理員</button></div></div>`;
    await window.loadAdminAccounts();
  };
  window.loadAdminAccounts=async()=>{
    const target=$('#accountList');if(!target)return;
    try{
      const {accounts}=await callAccounts({action:'list'});
      target.innerHTML=(accounts||[]).map(account=>`<div class="order"><b>${escapeRole(account.login_name||account.id)}</b><span class="pill ${account.is_active?'paid':'unpaid'}" style="float:right">${account.is_active?'啟用中':'已停用'}</span><div class="small">一般管理員</div><div class="adminlist" style="margin-top:7px"><button class="btn light smallbtn" onclick="setAdminAccountActive('${escapeRole(account.id)}',${account.is_active?'false':'true'})">${account.is_active?'停用':'啟用'}</button><button class="btn danger smallbtn" onclick="deleteAdminAccount('${escapeRole(account.id)}','${escapeRole(account.login_name||account.id)}')">刪除</button></div></div>`).join('')||'<p class="small">尚未建立一般管理員。</p>';
    }catch(error){target.textContent='讀取失敗：'+error.message;}
  };
  window.createAdminAccount=async()=>{
    try{
      const login_name=normalizeLoginName($('#newAdminLoginName')?.value),password=$('#newAdminPassword')?.value||'';
      if(!validLoginName(login_name))throw new Error('帳號名稱限 3～24 個英文字母、數字、句點、底線或連字號。');
      if(password.length<4)throw new Error('密碼至少需要 4 個字元。');
      await callAccounts({action:'create',login_name,password});
      $('#newAdminLoginName').value='';$('#newAdminPassword').value='';
      alert('一般管理員已建立。');window.loadAdminAccounts();
    }catch(error){alert(error.message);}
  };
  window.setAdminAccountActive=async(id,is_active)=>{
    try{await callAccounts({action:'set_active',id,is_active});window.loadAdminAccounts();}catch(error){alert(error.message);}
  };
  window.deleteAdminAccount=async(id,loginName)=>{
    if(!confirm(`確定要永久刪除一般管理員「${loginName}」嗎？此操作無法復原。`))return;
    try{await callAccounts({action:'delete',id});window.loadAdminAccounts();}catch(error){alert(error.message);}
  };
  bootAuth();
})();
</script>
<script id="supabase-lazy-page-reads">
/* Read only what the current page needs. Requires supabase-lazy-read-optimization.sql. */
(()=>{
  let supported=null,loading=false;
  const api=name=>SUPABASE_URL+'/rest/v1/rpc/'+name;
  const call=async(name,body={})=>{
    const response=await fetch(api(name),{method:'POST',headers:{...headers,'Content-Type':'application/json'},body:JSON.stringify(body),cache:'no-store'});
    if(!response.ok)throw new Error(await response.text());
    return response.json();
  };
  const asObject=value=>Array.isArray(value)?(value[0]||{}):(value||{});
  const setBase=()=>window.__togetherSetSyncBase?.(data);
  const persist=()=>{try{persistLocal?.()}catch(_){localStorage.setItem(KEY,JSON.stringify(data))}};
  const applySummary=payload=>{
    const next=normalize({...data,stores:payload.stores||[],groups:payload.groups||[],orders:payload.orders||data.orders||[]});
    data=next;setBase();persist();
  };
  const loadOrders=async ids=>{
    if(!ids.length){data.orders=[];return}
    const rows=await call('together_orders_for_groups',{p_group_ids:ids});
    data.orders=dedupeOrders((rows||[]).map(row=>row.order_data||row).filter(Boolean));
    persist();
  };
  async function openSummary(){
    const payload=asObject(await call('together_open_group_summary'));
    applySummary({...payload,orders:[]});
    supported=true;
  }
  async function historySummary(){
    const payload=asObject(await call('together_history_group_summary'));
    applySummary({...payload,orders:[]});
    await loadOrders((data.groups||[]).map(group=>String(group.id)).filter(Boolean));
    supported=true;
  }
  async function adminSnapshot(){
    const payload=asObject(await call('together_admin_snapshot'));
    data=normalize({...payload,orders:[]});setBase();persist();
    const groups=(data.groups||[]).filter(group=>{
      if(state.adminTab!==2)return false;
      if(state.orderTab===1)return true;
      return localDate(group.createdAt)===String(state.orderDate||localDate(new Date()));
    });
    if(state.adminTab===2)await loadOrders(groups.map(group=>String(group.id)).filter(Boolean));
    supported=true;
  }
  async function ensureStore(id){
    const existing=store(id);
    if(existing?.__lazyFull)return existing;
    const full=asObject(await call('together_store_menu',{p_store_id:String(id)}));
    if(!full?.id)throw new Error('找不到店家資料');
    full.__lazyFull=true;
    data.stores=[...(data.stores||[]).filter(entry=>entry.id!==full.id),full];
    setBase();persist();return full;
  }
  const fallbackLoad=loadSharedState;
  loadSharedState=async function(force=false){
    if(loading)return;
    if(!navigator.onLine)return fallbackLoad(force);
    loading=true;
    try{
      if(state.page==='history')await historySummary();
      else if(state.page==='admin'&&state.role&&state.role!=='user')await adminSnapshot();
      else if(state.page==='menu'||state.page==='order'){
        await openSummary();
        if(state.group)await ensureStore(state.group&&group(state.group)?.storeId);
      }else await openSummary();
      setSyncStatus?.('ok','已更新');
      if(state.page==='history')previousHistory();
      else if(state.page==='admin')previousAdmin();
      else if(force||state.page!=='order')render();
    }catch(error){
      supported=false;
      console.info('分頁讀取尚未啟用，改用相容模式。',error);
      return fallbackLoad(force);
    }finally{loading=false}
  };
  const previousMenu=menu;
  menu=async function(){
    try{
      let current=group(state.group);
      if(!current){await openSummary();current=group(state.group)}
      if(!current)return previousMenu();
      const target=store(current.storeId);
      if(!target?.__lazyFull){
        $('#headline').textContent='載入菜單';
        $('#view').innerHTML='<div class="empty">正在載入這間店家的菜單…</div>';
        await ensureStore(current.storeId);
      }
      return previousMenu();
    }catch(error){return previousMenu()}
  };
  const previousOrderForm=orderForm;
  orderForm=async function(){
    try{
      const current=group(state.group);
      if(current&&!store(current.storeId)?.__lazyFull)await ensureStore(current.storeId);
    }catch(_){}
    return previousOrderForm();
  };
  const previousHistory=history;
  history=async function(){
    $('#headline').textContent='本次與最近兩次團購';
    $('#view').innerHTML='<div class="empty">正在讀取歷史訂單…</div>';
    try{await historySummary()}catch(error){console.info(error)}
    return previousHistory();
  };
  const previousAdmin=admin;
  admin=async function(...args){
    if(state.role&&state.role!=='user'){
      $('#view').innerHTML='<div class="empty">正在讀取後台資料…</div>';
      try{await adminSnapshot()}catch(error){console.info(error)}
    }
    return previousAdmin.apply(this,args);
  };
  window.__togetherLazyRefresh=()=>{
    if(!supported)return false;
    loadSharedState(true);return true;
  };
})();
</script>

<script id="desktop-edit-store-repair">
/* Keep the desktop "修改" action independent from temporary form drafts. */
(()=>{
  const clean=value=>String(value||'').trim();
  const menuLinksFor=entry=>{
    const files=entry?.menuFiles?.length
      ? entry.menuFiles
      : (entry?.importData?[{name:entry.importName||'菜單',data:entry.importData}]:[]);
    return files
      .filter(file=>/^https?:\/\//i.test(String(file?.data||'')))
      .map(file=>`${clean(file.name)||'菜單'}/${clean(file.data)}`)
      .join('\n');
  };
  const fillStoreForm=id=>{
    const entry=store(id);
    const name=document.querySelector('#sname');
    if(!entry||!name)return false;
    name.value=entry.name||'';
    name.dataset.id=entry.id;
    const set=(selector,value)=>{const field=document.querySelector(selector);if(field)field.value=value??''};
    set('#scat',entry.category||'');
    set('#sphone',entry.phone||'');
    set('#saddress',entry.address||'');
    set('#smethod',entry.method||'');
    set('#snote',entry.note||'');
    set('#smenuNotice',entry.menuNotice||'');
    set('#externalMenuLinks',menuLinksFor(entry));
    return true;
  };
  const renderAdmin=window.admin;
  const uid=()=>crypto.randomUUID?.()||(`desktop-${Date.now()}-${Math.random().toString(16).slice(2)}`);
  const toBuilder=items=>{
    const blocks=[];let previousSection=Symbol('none'),block;
    (items||[]).forEach(source=>{
      const section=source.section||'';
      if(section!==previousSection){
        block={id:uid(),title:section,items:[],collapsed:false};
        blocks.push(block);previousSection=section;
      }
      const sourceGroups=Array.isArray(source.optionGroups)?source.optionGroups:[];
      const priceGroup=sourceGroups.find(group=>group.pricing)||sourceGroups.find(group=>/分量|容量|價格/.test(String(group.name||''))&&Object.keys(group.adjustments||{}).length);
      const priceRows=priceGroup
        ? (priceGroup.values||[]).map(value=>({id:uid(),label:value,price:String(priceGroup.adjustments?.[value]??0)}))
        : [{id:uid(),label:source.specs||'固定規格',price:String(source.price??0)}];
      block.items.push({
        id:uid(),name:source.name||'',notice:source.notice||'',collapsed:false,
        priceRows:priceRows.length?priceRows:[{id:uid(),label:'',price:''}],
        groups:sourceGroups.filter(group=>group!==priceGroup).map(group=>{
          const values=Array.isArray(group.values)?group.values:[];
          const hasPrice=values.some(value=>Object.prototype.hasOwnProperty.call(group.adjustments||{},value));
          return {id:uid(),name:group.name||'',noPrice:!hasPrice,required:group.required!==false,collapsed:false,
            rows:(values.length?values:['']).map(value=>({id:uid(),label:value,price:hasPrice?String(group.adjustments?.[value]??0):''}))};
        })
      });
    });
    return blocks.length?blocks:[{id:uid(),title:'',items:[{id:uid(),name:'',notice:'',priceRows:[{id:uid(),label:'',price:''}],groups:[]}]}];
  };
  window.editStore=function(id){
    const entry=store(id);if(!entry)return;
    window.clearStoreDraft?.();
    state.adminTab=1;
    state.storeQuery='';state.storeCategory='';
    state.storeBuildMode=entry.quickMenu?'quick':'full';
    state.desktopStoreId=id;
    state.menuBuilder=toBuilder(entry.items||[]);
    renderAdmin();
    [0,90,250,600].forEach(delay=>setTimeout(()=>fillStoreForm(id),delay));
    window.scrollTo({top:0,behavior:'smooth'});
  };
})();
</script>

<script id="desktop-menu-editor-interaction">

  window.desktopMenuSelectItem=(blockId,itemId)=>{
    const block=findBlock(blockId);if(!block)return;
    block.collapsed=false;setSelection(blockId,itemId);window.renderMenuBuilder?.();
  };
  window.desktopMenuToggleBlock=(blockId)=>{
    const block=findBlock(blockId);if(!block)return;

  window.desktopMenuAddItem=()=>{
    const current=selected();

    if(!block)return;
    const before=(block.items||[]).map(item=>item.id);
    window.builderAddItem?.(block.id,false);
    const added=(block.items||[]).find(item=>!before.includes(item.id));
    if(added)setSelection(block.id,added.id);
    window.renderMenuBuilder?.();
  };
  window.desktopMenuSave=()=>window.createStore?.();

  const previousRefresh=window.refreshDesktopMenuTable;
  window.refreshDesktopMenuTable=()=>{
    if(!isDesktop())return previousRefresh?.();

  };

  const previousRender=window.renderMenuBuilder;
  if(typeof previousRender==='function'){
    window.renderMenuBuilder=function(...args){
      const result=previousRender.apply(this,args);
      setTimeout(()=>{window.refreshDesktopMenuTable?.();applyEditorFocus();},0);

  window.addEventListener('resize',()=>setTimeout(applyEditorFocus,0));
})();

<script id="desktop-item-editor-tabs">
/* 電腦版品項編輯分頁：品項資料與其他規格分開閱讀；手機維持原版。 */
(()=>{
  const isDesktop=()=>matchMedia('(min-width:900px)').matches;
  const tabs=()=>state.desktopItemEditorTabs||(state.desktopItemEditorTabs={});
  const currentTab=(blockId,itemId)=>tabs()[`${blockId}:${itemId}`]||'item';
  const applyTabs=()=>{
    if(!isDesktop())return;
    document.querySelectorAll('#menuBuilder .builder-section').forEach(section=>{
      const blockId=section.dataset.block;
      const cards=[...section.querySelectorAll(':scope > .menu-builder > .menu-block')];
      cards.forEach((card,index)=>{
        const block=(state.menuBuilder||[]).find(entry=>entry.id===blockId);
        const itemId=block?.items?.[index]?.id;
        if(!itemId)return;
        card.dataset.desktopItemId=itemId;
        const tab=currentTab(blockId,itemId);
        card.querySelectorAll('[data-desktop-editor-panel]').forEach(panel=>panel.classList.toggle('desktop-editor-panel-hidden',panel.dataset.desktopEditorPanel!==tab));
        card.querySelectorAll('[data-desktop-editor-tab]').forEach(button=>button.classList.toggle('active',button.dataset.desktopEditorTab===tab));
      });
    });
  };
  window.desktopItemEditorTab=(blockId,itemId,tab)=>{
    tabs()[`${blockId}:${itemId}`]=tab;
    applyTabs();
  };
  const decorate=()=>{
    if(!isDesktop())return;
    document.querySelectorAll('#menuBuilder .builder-section').forEach(section=>{
      const blockId=section.dataset.block;
      const block=(state.menuBuilder||[]).find(entry=>entry.id===blockId);
      const cards=[...section.querySelectorAll(':scope > .menu-builder > .menu-block')];
      cards.forEach((card,index)=>{
        const itemId=block?.items?.[index]?.id;
        if(!itemId||card.querySelector(':scope > .desktop-item-editor-tabs'))return;
        const head=card.querySelector(':scope > .menu-block-head');
        if(!head)return;
        const fields=[...card.querySelectorAll(':scope > .builder-field')];
        const itemField=fields[0],noticeField=fields[1];
        const priceHeading=noticeField?.nextElementSibling;
        const priceRows=priceHeading?.nextElementSibling;
        const priceAdd=priceRows?.nextElementSibling;
        const specsHeading=priceAdd?.nextElementSibling;
        const specsGroups=specsHeading?.nextElementSibling;
        const specsActions=specsGroups?.nextElementSibling;
        [itemField,noticeField,priceHeading,priceRows,priceAdd].filter(Boolean).forEach(node=>node.dataset.desktopEditorPanel='item');
        [specsHeading,specsGroups,specsActions].filter(Boolean).forEach(node=>node.dataset.desktopEditorPanel='spec');
        const nav=document.createElement('div');
        nav.className='desktop-item-editor-tabs';
        nav.innerHTML=`<button type="button" data-desktop-editor-tab="item" onclick="desktopItemEditorTab('${blockId}','${itemId}','item')">品項</button><button type="button" data-desktop-editor-tab="spec" onclick="desktopItemEditorTab('${blockId}','${itemId}','spec')">規格</button>`;
        head.insertAdjacentElement('afterend',nav);
      });
    });
    applyTabs();
  };
  const style=document.createElement('style');
  style.textContent=`
    @media (min-width:900px){

      #menuBuilder .builder-section:not(.is-collapsed) > .menu-builder > .menu-block>.builder-field[data-desktop-editor-panel="item"] textarea{min-height:56px;height:56px;resize:vertical}
      #menuBuilder .builder-section:not(.is-collapsed) > .menu-builder > .menu-block>[data-desktop-editor-panel="item"],
      #menuBuilder .builder-section:not(.is-collapsed) > .menu-builder > .menu-block>[data-desktop-editor-panel="spec"]{grid-column:1/-1}
      #menuBuilder .builder-section:not(.is-collapsed) > .menu-builder > .menu-block>[data-desktop-editor-panel="spec"] .extra-group-card{width:100%;margin-top:10px}
      #menuBuilder .builder-section:not(.is-collapsed) > .menu-builder > .menu-block>[data-desktop-editor-panel="spec"] .extra-group-card{padding:8px 10px!important;min-height:0}
      #menuBuilder .builder-section:not(.is-collapsed) > .menu-builder > .menu-block>[data-desktop-editor-panel="spec"] .extra-group-card .extra-group-head{grid-template-columns:34px minmax(90px,1fr) auto auto 38px;gap:6px}
      #menuBuilder .builder-section:not(.is-collapsed) > .menu-builder > .menu-block>[data-desktop-editor-panel="spec"] .extra-group-card .group-drag-handle{width:34px;height:38px}
      #menuBuilder .builder-section:not(.is-collapsed) > .menu-builder > .menu-block>[data-desktop-editor-panel="spec"] .extra-group-card [data-apply-same-group]{padding:7px 8px;font-size:12px;white-space:nowrap}
      #menuBuilder .builder-section:not(.is-collapsed) > .menu-builder > .menu-block>[data-desktop-editor-panel="spec"] .extra-group-card .group-collapse-btn{padding:7px 8px;font-size:12px;white-space:nowrap}
      #menuBuilder .builder-section:not(.is-collapsed) > .menu-builder > .menu-block>[data-desktop-editor-panel="spec"] .extra-group-card .builder-remove{width:38px;min-width:38px;height:38px;padding:0}
      /* Keep collapsed sweetener/ice/etc. cards compact on one line. */
      #menuBuilder .builder-section:not(.is-collapsed) > .menu-builder > .menu-block>[data-desktop-editor-panel="spec"] .extra-group-card.is-collapsed{padding:8px 10px!important}
      #menuBuilder .builder-section:not(.is-collapsed) > .menu-builder > .menu-block>[data-desktop-editor-panel="spec"] .extra-group-card.is-collapsed .extra-group-head{display:flex;align-items:center;gap:8px;min-width:0}
      #menuBuilder .builder-section:not(.is-collapsed) > .menu-builder > .menu-block>[data-desktop-editor-panel="spec"] .extra-group-card.is-collapsed .group-drag-handle{width:34px;height:38px;flex:0 0 34px}
      #menuBuilder .builder-section:not(.is-collapsed) > .menu-builder > .menu-block>[data-desktop-editor-panel="spec"] .extra-group-card.is-collapsed .collapsed-group-name{flex:1;min-width:0}
      #menuBuilder .builder-section:not(.is-collapsed) > .menu-builder > .menu-block>[data-desktop-editor-panel="spec"] .extra-group-card.is-collapsed .group-collapse-btn,#menuBuilder .builder-section:not(.is-collapsed) > .menu-builder > .menu-block>[data-desktop-editor-panel="spec"] .extra-group-card.is-collapsed .builder-remove{flex:0 0 auto;margin:0!important}
      #menuBuilder .menu-block.desktop-editor-selected{grid-template-columns:minmax(0,1fr)!important;padding:16px!important}
      #menuBuilder .menu-block.desktop-editor-selected>.desktop-item-editor-tabs{grid-column:1/-1;grid-row:auto;order:0;margin:0 0 2px;max-width:330px}
      #menuBuilder .menu-block.desktop-editor-selected>.builder-field[data-desktop-editor-panel="item"]{grid-column:1/-1;margin-top:4px!important}
      #menuBuilder .menu-block.desktop-editor-selected>.builder-field[data-desktop-editor-panel="item"] textarea{min-height:56px;height:56px;resize:vertical}
      #menuBuilder .menu-block.desktop-editor-selected>[data-desktop-editor-panel="item"]{grid-column:1/-1}
      #menuBuilder .menu-block.desktop-editor-selected>[data-desktop-editor-panel="spec"]{grid-column:1/-1}
      #menuBuilder .menu-block.desktop-editor-selected>[data-desktop-editor-panel="spec"] .extra-group-card{width:100%;margin-top:10px}
    }
  `;
  document.head.appendChild(style);
  const oldRender=window.renderMenuBuilder;
  if(typeof oldRender==='function'){
    window.renderMenuBuilder=function(...args){
      const result=oldRender.apply(this,args);
      setTimeout(decorate,0);
      return result;
    };
  }
  setTimeout(decorate,0);
  window.addEventListener('resize',()=>setTimeout(decorate,0));
})();
</script>
<script id="bulk-same-group-two-column-picker">
/* A compact two-column block picker for applying a same-named extra group. */
(()=>{
  const clean=value=>String(value||'').trim();
  const esc=value=>String(value??'').replace(/[&<>'"]/g,char=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[char]));
  const normalizedName=value=>clean(value).replace(/\s+/g,' ').toLocaleLowerCase();
  const findGroup=(bid,iid,gid)=>{
    const block=(state.menuBuilder||[]).find(entry=>entry.id===bid);
    const item=block?.items?.find(entry=>entry.id===iid);
    return item?.groups?.find(entry=>entry.id===gid);
  };
  const style=document.createElement('style');
  style.textContent=`
    .bulk-apply-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:12px}
    .bulk-apply-card{border:1px solid var(--line);border-radius:10px;background:#fff;overflow:hidden}
    .bulk-apply-card-head{display:flex;align-items:center;gap:8px;padding:9px 10px;background:#faf9f4;border-bottom:1px solid var(--line)}
    .bulk-apply-card-head label{flex:1;min-width:0;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .bulk-apply-toggle{border:0;background:transparent;color:var(--muted);font:inherit;cursor:pointer;padding:3px 5px}
    .bulk-apply-items{display:grid}
    .bulk-apply-items[hidden]{display:none}
    .bulk-apply-items label{display:flex;align-items:center;gap:8px;padding:8px 10px;border-bottom:1px solid var(--line);cursor:pointer}
    .bulk-apply-items label:last-child{border-bottom:0}
    @media(max-width:640px){.bulk-apply-grid{grid-template-columns:1fr}}
  `;
  document.head.appendChild(style);
  window.builderToggleBulkSection=(button,blockId)=>{
    const card=button.closest('.bulk-apply-card');
    const list=card?.querySelector('[data-bulk-list]');if(!list)return;
    list.hidden=!list.hidden;button.textContent=list.hidden?'▸':'▾';
  };
  window.builderApplySameNamedGroup=function(bid,iid,gid){
    const source=findGroup(bid,iid,gid),key=normalizedName(source?.name);
    if(!source||!key)return alert('請先輸入規格欄位名稱，再套用同名規格。');
    const blocks=state.menuBuilder||[];
    const blockLabel=block=>clean(block.title)||`區塊 ${blocks.findIndex(entry=>entry.id===block.id)+1}`;
    const choices=blocks.map(block=>({block,items:(block.items||[]).filter(item=>item.id!==iid)})).filter(choice=>choice.items.length);
    if(!choices.length)return alert('沒有其他可套用的品項。');
    $('#modal').innerHTML=`<div class="modal"><div class="modalbox form"><h2>選擇要套用的品項</h2><p class="small">將「${esc(source.name)}」的規格套用到勾選品項，套用後仍可各自修改。</p><div class="bulk-apply-grid">${choices.map(({block,items})=>`<section class="bulk-apply-card"><div class="bulk-apply-card-head"><label class="builder-check"><input type="checkbox" data-bulk-block-toggle data-block-id="${esc(block.id)}" checked onchange="builderToggleBulkBlock(this,'${block.id}')">【${esc(blockLabel(block))}】</label><button type="button" class="bulk-apply-toggle" aria-label="展開或收合品項" onclick="builderToggleBulkSection(this,'${block.id}')">▸</button></div><div class="bulk-apply-items" data-bulk-list hidden>${items.map(item=>`<label class="builder-check"><input type="checkbox" data-bulk-item data-bulk-item-block="${esc(block.id)}" value="${esc(block.id)}|${esc(item.id)}" checked> ${esc(item.name||'未命名品項')}</label>`).join('')}</div></section>`).join('')}</div><div class="row" style="margin-top:16px"><button type="button" class="btn light" onclick="closeModal()">取消</button><button type="button" class="btn" onclick="builderConfirmApplySameNamedGroup('${bid}','${iid}','${gid}')">套用選取品項</button></div></div></div>`;
  };
})();
</script>
<script id="order-edit-direct-open">
/* 「修改」直接開啟已帶入內容的訂單編輯頁。 */
(()=>{
  const openEditor=id=>{
    const order=data.orders.find(entry=>entry.id===id);
    const orderGroup=order&&group(order.groupId);
    const orderStore=orderGroup&&store(orderGroup.storeId);
    if(!order||!orderGroup||!orderStore||!isOpen(orderGroup)){
      alert('此訂單目前無法修改');return;
    }
    const cart={};
    (orderStore.items||[]).forEach((item,index)=>{
      const selected=(order.items||[]).find(entry=>entry.name===item.name);
      if(!selected)return;
      const groups=optionGroups(item),itemVariants=variants(item);
      const entry={q:Number(selected.qty)||0,variant:0,options:{}};
      if(groups.length){
        const selectedOptions=String(selected.spec||'').split('、').reduce((all,part)=>{
          const at=part.indexOf(':');if(at>0)all[part.slice(0,at)]=part.slice(at+1);return all;
        },{});
        groups.forEach(option=>{entry.options[option.name]=selectedOptions[option.name]||option.values[0]||''});
      }else{
        const matched=itemVariants.findIndex(variant=>variant.spec===selected.spec);
        entry.variant=matched<0?0:matched;
      }
      cart[index]=entry;
    });
    try{
      const key=KEY+'-owned-order-ids';
      const owned=JSON.parse(localStorage.getItem(key)||'{}');
      owned[id]=true;localStorage.setItem(key,JSON.stringify(owned));
    }catch(_){}
    state.group=orderGroup.id;state.buyer=order.buyer;state.cart=cart;
    state.editingOrderId=id;state.selectedItem=null;state.focusItem=null;
    /* 先進入與一般訂購相同的菜單頁，保留全部商品／分類頁籤。 */
    go('menu');
  };
  window.editOwnOrder=openEditor;
  /* Capture clicks before old inline handlers, so the 修改 button remains
     reliable even if older menu scripts redraw the history list. */
  document.addEventListener('click',event=>{
    const button=event.target.closest?.('button[onclick*="editOwnOrder"]');
    const match=button?.getAttribute('onclick')?.match(/editOwnOrder\('([^']+)'\)/);
    if(!match)return;
    event.preventDefault();event.stopImmediatePropagation();openEditor(match[1]);
  },true);
})();
</script>
<script id="final-external-menu-url-save">
/* Menu links are URL-only. Keep the legacy file input hidden and save the
   entered link after the legacy editor has completed its redraw. */
(()=>{
  const normalUrl=value=>{
    const text=String(value||'').trim();
    if(!text)return '';
    return /^https?:\/\//i.test(text)?text:`https://${text}`;
  };
  const hideLegacyMenuUpload=()=>{
    const root=document.querySelector('#view');
    if(!root)return;
    const input=root.querySelector('input[type="file"]');
    if(input){
      input.style.setProperty('display','none','important');
      const previous=input.previousElementSibling;
      if(previous?.tagName==='LABEL')previous.style.setProperty('display','none','important');
    }
    root.querySelector('#filehint')?.style.setProperty('display','none','important');
    root.querySelector('#menuFileList')?.style.setProperty('display','none','important');
  };
  const applyMenuUrl=snapshot=>{
    let target=snapshot.id&&store(snapshot.id);
    if(!target)target=(data.stores||[]).find(entry=>!snapshot.beforeIds.has(entry.id));
    if(!target)return;
    target.menuFiles=snapshot.url?[{name:snapshot.name,data:snapshot.url}]:[];
    target.importName=snapshot.url?snapshot.name:'';
    target.importData=snapshot.url?snapshot.url:'';
    save();
  };
  const fillSavedMenuUrl=id=>{
    const target=store(id);
    if(!target)return;
    const files=Array.isArray(target.menuFiles)&&target.menuFiles.length
      ?target.menuFiles
      :(target.importData?[{name:target.importName||'菜單',data:target.importData}]:[]);
    const link=files.find(file=>/^https?:\/\//i.test(String(file?.data||'')));
    const name=link?.name||'';
    const url=link?.data||'';
    const hidden=document.querySelector('#externalMenuLinks');
    if(hidden)hidden.value=url?`${name||'菜單'}/${url}`:'';
    const nameField=document.querySelector('#singleMenuName');
    const urlField=document.querySelector('#singleMenuUrl');
    if(nameField)nameField.value=name;
    if(urlField)urlField.value=url;
  };
  const previousCreateStore=window.createStore;
  window.createStore=function(...args){
    const name=String(document.querySelector('#singleMenuName')?.value||'').trim()||'菜單';
    const url=normalUrl(document.querySelector('#singleMenuUrl')?.value);
    const id=document.querySelector('#sname')?.dataset.id;
    const hidden=document.querySelector('#externalMenuLinks');
    if(hidden)hidden.value=url?`${name}/${url}`:'';
    const snapshot={id,name,url,beforeIds:new Set((data.stores||[]).map(entry=>entry.id))};
    const result=previousCreateStore.apply(this,args);
    setTimeout(()=>applyMenuUrl(snapshot),0);
    return result;
  };
  /* The desktop editor renders a fresh form when 「修改」 is pressed.
     Fill its URL fields from the already-saved store after that render. */
  const previousEditStore=window.editStore;
  window.editStore=function(id,...args){
    const result=previousEditStore.apply(this,[id,...args]);
    [0,90,250,600].forEach(delay=>setTimeout(()=>fillSavedMenuUrl(id),delay));
    return result;
  };
  const refresh=()=>setTimeout(hideLegacyMenuUpload,0);
  document.addEventListener('DOMContentLoaded',refresh);
  new MutationObserver(refresh).observe(document.documentElement,{childList:true,subtree:true});
})();
</script>
